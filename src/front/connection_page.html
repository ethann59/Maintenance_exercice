<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Ma Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .login-card:hover { transform: translateY(-5px); }

        h2 { margin-top: 0; color: #4a4a4a; font-weight: 600; }
        p.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input:focus { border-color: #764ba2; outline: none; }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .error { color: #e74c3c; margin-top: 15px; font-size: 0.9rem; min-height: 20px; }
        .success { color: #27ae60; margin-top: 15px; font-size: 0.9rem; min-height: 20px; }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #764ba2;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }

        .toggle-mode {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
        .toggle-mode a {
            color: #764ba2;
            cursor: pointer;
            text-decoration: none;
        }
        .toggle-mode a:hover { text-decoration: underline; }

        .password-requirements {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2 id="formTitle">Bon retour !</h2>
    <p class="subtitle" id="formSubtitle">Connectez-vous pour acceder a votre espace.</p>

    <form id="authForm">
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" placeholder="ex: alice" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password">
            <p class="password-requirements" id="passwordHint" style="display: none;">Minimum 6 caracteres</p>
        </div>
        <button type="submit" id="submitBtn">Se connecter</button>
        <p class="error" id="errorMsg"></p>
        <p class="success" id="successMsg"></p>
    </form>

    <p class="toggle-mode">
        <span id="toggleText">Pas encore de compte ?</span>
        <a id="toggleLink" onclick="toggleMode()">Creer un compte</a>
    </p>

    <a href="index.html" class="back-link">&#8592; Retour a l'accueil</a>
</div>

<script>
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        const title = document.getElementById('formTitle');
        const subtitle = document.getElementById('formSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const toggleLink = document.getElementById('toggleLink');
        const passwordHint = document.getElementById('passwordHint');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        errorMsg.textContent = '';
        successMsg.textContent = '';

        if (isLoginMode) {
            title.textContent = 'Bon retour !';
            subtitle.textContent = 'Connectez-vous pour acceder a votre espace.';
            submitBtn.textContent = 'Se connecter';
            toggleText.textContent = 'Pas encore de compte ?';
            toggleLink.textContent = 'Creer un compte';
            passwordHint.style.display = 'none';
        } else {
            title.textContent = 'Creer un compte';
            subtitle.textContent = 'Rejoignez-nous pour profiter de nos offres.';
            submitBtn.textContent = "S'inscrire";
            toggleText.textContent = 'Deja un compte ?';
            toggleLink.textContent = 'Se connecter';
            passwordHint.style.display = 'block';
        }
    }

    document.getElementById('authForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        errorMsg.textContent = '';
        successMsg.textContent = '';

        // Client-side validation
        if (!username || !password) {
            errorMsg.textContent = 'Veuillez remplir tous les champs.';
            return;
        }

        if (!isLoginMode && password.length < 6) {
            errorMsg.textContent = 'Le mot de passe doit contenir au moins 6 caracteres.';
            return;
        }

        const endpoint = isLoginMode ? '/api/users/login' : '/api/users/register';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Chargement...';

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Store token and user info
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.user.username);
                localStorage.setItem('userId', data.user.id);

                successMsg.textContent = isLoginMode ? 'Connexion reussie !' : 'Compte cree avec succes !';

                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            } else {
                errorMsg.textContent = data.message || 'Une erreur est survenue.';
                submitBtn.disabled = false;
                submitBtn.textContent = isLoginMode ? 'Se connecter' : "S'inscrire";
            }
        } catch (error) {
            console.error('Erreur:', error);
            errorMsg.textContent = 'Erreur de connexion au serveur.';
            submitBtn.disabled = false;
            submitBtn.textContent = isLoginMode ? 'Se connecter' : "S'inscrire";
        }
    });

    // Check if already logged in
    const token = localStorage.getItem('token');
    if (token) {
        // Verify token is still valid
        fetch('/api/users/verify', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => {
            if (res.ok) {
                window.location.href = 'index.html';
            } else {
                // Token invalid, clear storage
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                localStorage.removeItem('userId');
            }
        })
        .catch(() => {
            // Error verifying, keep user on login page
        });
    }
</script>

</body>
</html>
